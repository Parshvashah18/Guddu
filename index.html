<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love</title>

<style>
:root {
    --primary-pink: #ff4d6d;
    --border-gold: #ffd700;
    --soft-white: #fff0f3;
}

body {
    margin: 0;
    font-family: sans-serif;
    background: var(--soft-white);
}

/* Pages */
.page {
    display: none;
    min-height: 100vh;
    padding: 15px;
    box-sizing: border-box;
    text-align: center;
    border: 6px double var(--border-gold);
}

#page1 { display: block; }

/* Buttons */
.next-btn {
    margin-top: 20px;
    padding: 12px 25px;
    font-size: 1rem;
    border-radius: 30px;
    border: none;
    background: var(--primary-pink);
    color: white;
}

/* Grid */
.photo-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
    gap: 10px;
    margin-top: 20px;
}

.photo-wrapper img {
    width: 100%;
    aspect-ratio: 1/1;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--primary-pink);
}

/* Love wall */
.love-wall {
    font-size: 0.75rem;
    line-height: 1.4;
    background: white;
    padding: 10px;
    border-radius: 10px;
    max-height: 60vh;
    overflow-y: auto;
}

/* Floating hearts */
.heart {
    position: fixed;
    bottom: -10px;
    animation: floatUp 5s linear infinite;
    color: var(--primary-pink);
}

@keyframes floatUp {
    to {
        transform: translateY(-100vh);
        opacity: 0;
    }
}

/* Responsive text */
h1 { font-size: 1.6rem; }
h2 { font-size: 1.3rem; }

@media (min-width: 768px) {
    h1 { font-size: 2.2rem; }
    h2 { font-size: 1.6rem; }
}
</style>
</head>

<body>

<!-- Music -->
<audio autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<!-- Floating hearts -->
<script>
setInterval(()=>{
 let h=document.createElement("div");
 h.className="heart";
 h.innerHTML="❤️";
 h.style.left=Math.random()*100+"vw";
 h.style.fontSize=(15+Math.random()*20)+"px";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),5000);
},500);
</script>

<!-- Page 1 -->
<div class="page" id="page1">
    <h1>To My Favorite Person ❤️</h1>
    <p>I have something special for you...</p>
    <button class="next-btn" onclick="showPage('page2')">Open 💌</button>
</div>

<!-- Page 2 -->
<div class="page" id="page2">
    <h2>Us Together 💋</h2>

    <div class="photo-container">
        <img src="WhatsApp Image 2026-03-26 at 7.51.45 PM (1).jpeg">
        <img src="WhatsApp Image 2026-03-26 at 7.51.45 PM (2).jpeg">
        <img src="WhatsApp Image 2026-03-26 at 7.51.45 PM.jpeg">
        <img src="WhatsApp Image 2026-03-26 at 7.54.50 PM (1).jpeg">
        <img src="WhatsApp Image 2026-03-26 at 7.54.50 PM.jpeg">
        <img src="WhatsApp Image 2026-03-26 at 7.54.51 PM.jpeg">
        <img src="WhatsApp Image 2026-03-26 at 7.51.45 PM (3).jpeg">
        
    </div>

    <button class="next-btn" onclick="showPage('page3')">Next ❤️</button>
</div>

<!-- Page 3 -->
<div class="page" id="page3">
    <div class="love-wall" id="loveWall"></div>
    <button class="next-btn" onclick="showPage('page1')">Restart ❤️</button>
</div>

<script>
function showPage(id){
 document.querySelectorAll(".page").forEach(p=>p.style.display="none");
 document.getElementById(id).style.display="block";
}

let txt="";
for(let i=0;i<100;i++){
 txt+="I Love You Guddu ❤️ ";
 if(i%4===0) txt+="<br>";
}
document.getElementById("loveWall").innerHTML=txt;
</script>

</body>
</html>
